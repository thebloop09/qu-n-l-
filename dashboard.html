<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <div style="font-weight: 700; font-size: 20px; color: var(--primary)">INVITO</div>
        
        <div class="user-menu-dropdown">
            <button class="menu-trigger" onclick="toggleUserMenu()" title="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div id="userMenuContent" class="dropdown-content">
                <div class="user-info-header">
                    <span style="font-size: 11px; color: var(--text-sub);">Tài khoản</span>
                    <span id="userEmail" class="user-email-text">Đang tải...</span>
                </div>
                
                <hr class="dropdown-divider">
                
                <button id="themeToggleBtn" class="dropdown-item-btn">
                    <span id="themeIcon">🌙</span> <span id="themeText">Chế độ tối</span>
                </button>
                
                <hr class="dropdown-divider">
                
                <button class="btn-danger-link" onclick="logout()">🚪 Đăng xuất</button>
            </div>
        </div>
    </header>
    <main>
        <div class="header-flex">
            <h1>Thiệp của bạn</h1>
            <button class="btn-primary" onclick="location.href='editor.html'">+ Tạo thiệp mới</button>
        </div>
        <div id="invitationList" class="grid-list">
            <!-- Danh sách thiệp sẽ render ở đây -->
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="storage.js"></script>
    <script src="main.js"></script>
</body>
</html>
