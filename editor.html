<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết kế thiệp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div style="font-weight: 700; font-size: 20px; color: var(--primary); cursor: pointer;" onclick="location.href='dashboard.html'">INVITO</div>
    
    <div class="user-menu-dropdown">
        <button class="menu-trigger" onclick="toggleUserMenu()" title="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div id="userMenuContent" class="dropdown-content">
            <div class="user-info-header">
                <span style="font-size: 11px; color: var(--text-sub);">Tài khoản</span>
                <span id="userEmail" class="user-email-text">Đang tải...</span>
            </div>
            
            <hr class="dropdown-divider">
            
            <button id="themeToggleBtn" class="dropdown-item-btn">
                <span id="themeIcon">🌙</span> <span id="themeText">Chế độ tối</span>
            </button>
            
            <hr class="dropdown-divider">
            
            <button class="btn-danger-link" onclick="logout()">🚪 Đăng xuất</button>
        </div>
    </div>
</header>
    <div class="editor-layout">
        <div class="form-side">
            <h2>Thiết kế thiệp</h2>
            
            <div class="input-group">
                <label>Loại sự kiện</label>
                <select id="eventType">
                    <option value="LỄ CƯỚI">Đám cưới</option>
                    <option value="SINH NHẬT">Sinh nhật</option>
                    <option value="KHAI TRƯƠNG">Khai trương</option>
                    <option value="TIỆC TỐI">Tiệc thân mật</option>
                </select>
            </div>

            <div class="input-group">
                <label>Tiêu đề chính (Tên chủ tiệc/Sự kiện)</label>
                <input type="text" id="mainTitle" placeholder="Ví dụ: Anh Tuấn & Lan Anh">
            </div>

            <div class="input-group">
                <label>Thông điệp</label>
                <input type="text" id="subMessage" placeholder="Ví dụ: Trân trọng kính mời...">
            </div>

            <div class="input-group">
                <label>Ngày diễn ra</label>
                <input type="date" id="eventDate">
            </div>

            <div class="input-group">
                <label>Địa điểm</label>
                <input type="text" id="location" placeholder="Tên sảnh, địa chỉ...">
            </div>

            <div class="input-group">
                <label>Giao diện (Template)</label>
                <select id="themeSelect">
                    <option value="theme-elegant">Elegant (Sang trọng)</option>
                    <option value="theme-vibrant">Vibrant (Năng động)</option>
                    <!-- removed duplicate professional option -->
                    <option value="theme-modern">Modern (Hiện đại)</option>
                    <option value="theme-floral">Floral (Hoa văn)</option>
                    <option value="theme-classic">Classic (Cổ điển)</option>
                    <option value="theme-boho">Boho (Phong cách boho)</option>
                    <option value="theme-gold">Gold (Vàng sang trọng)</option>
                    <option value="theme-professional">Professional (Professional)</option>
                </select>
            </div>

            <button id="btnSave" class="btn-primary" style="width: 100%">Lưu và Xuất bản</button>
            <button onclick="location.href='dashboard.html'" class="btn-secondary" style="width: 100%; margin-top: 10px">Hủy bỏ</button>
        </div>

        <div class="preview-side">
            <div id="previewCard" class="theme-elegant">
                    <div class="card-inner">
                        <p class="event-type" id="viewType">LỄ CƯỚI</p>
                        <h1 id="viewTitle">Tên chủ tiệc</h1>
                        <p id="viewMessage">Trân trọng kính mời bạn...</p>
                        <div class="info-box">
                            <p><strong>📅 Ngày:</strong> <span id="viewDate">--/--/----</span></p>
                            <p><strong>📍 Địa điểm:</strong> <span id="viewLocation">Chưa cập nhật</span></p>
                        </div>
                    </div>
                </div>
        </div>
    </div>
    
    
    
    
    
    
    
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="storage.js"></script>
    <script src="main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Kiểm tra đăng nhập và tự động hiển thị Gmail lên navbar của Editor
            await checkAuth(); 
        });
    </script>
</body>
</html>







</body>
</html>
